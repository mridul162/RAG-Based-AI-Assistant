services:
  - type: web

    name: hasanah-mart-rag-api

    runtime: python

    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn api.app:app --host 0.0.0.0 --port 10000

    envVars:

      - key: OPENAI_API_KEY
        sync: false

      - key: DATABASE_URL
        sync: false

      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

      - key: WHATSAPP_ACCESS_TOKEN
        sync: false

      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false